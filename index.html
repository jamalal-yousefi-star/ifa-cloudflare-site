<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>IFA FOR PUBLIC SERVICES</title>
<meta name="description" content="IFA FOR PUBLIC SERVICES - خدمات عامة وتعليمية في تركيا">
<style>
:root {
 --bg:#070707;--bg2:#0d0d0f;--surface:#131316;--surface2:#18181c;
 --text:#f8f3ea;--muted:#c9bfb1;--gold:#c99b51;--gold2:#e7c57f;--line:rgba(201,155,81,.36);
 --green:#25d366;--shadow:0 24px 70px rgba(0,0,0,.35);--radius:28px;--max:1200px;
}
body.light {
 --bg:#f4efe7;--bg2:#fffaf3;--surface:#fffdf8;--surface2:#f8f1e5;
 --text:#181512;--muted:#62594f;--gold:#a97631;--gold2:#bd8b43;--line:rgba(169,118,49,.38);
 --shadow:0 22px 55px rgba(53,42,25,.12);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--bg);color:var(--text);font-family:Tahoma,Arial,sans-serif;line-height:1.75}
a{color:inherit;text-decoration:none}button,input,select,textarea{font:inherit}img{max-width:100%;display:block}
.container{width:min(var(--max),calc(100% - 32px));margin:auto}
.header{position:sticky;top:0;z-index:99;background:rgba(7,7,7,.92);border-bottom:1px solid var(--line);backdrop-filter:blur(14px)}
body.light .header{background:rgba(255,250,243,.92)}
.header-inner{min-height:86px;display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:nowrap}
.brand{display:flex;align-items:center;gap:12px;min-width:0}
.logo-light,.logo-dark{height:54px;width:auto;object-fit:contain;min-width:154px}
.logo-dark{display:none}body.light .logo-light{display:none}body.light .logo-dark{display:block}
.brand-name{font-weight:900;letter-spacing:.5px;white-space:nowrap}.brand-name span{display:block;color:var(--muted);font-size:12px;font-weight:800;letter-spacing:0}
.nav{display:flex;align-items:center;gap:6px;flex-wrap:nowrap;min-width:0}
.nav a,.nav button{border:0;background:transparent;color:var(--text);font-weight:900;padding:12px 15px;border-radius:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1.15;white-space:nowrap;min-height:48px}
.nav a:hover,.nav button:hover,.nav .active{background:rgba(201,155,81,.13);color:var(--gold2)}
.dropdown{position:relative;padding-bottom:18px;display:flex;align-items:center}
.dropdown-menu{position:absolute;top:100%;right:0;width:390px;padding:12px;border-radius:22px;background:var(--surface);border:1px solid var(--line);box-shadow:var(--shadow);display:none;gap:9px;z-index:120}
.dropdown-menu:before{content:"";position:absolute;top:-18px;left:0;right:0;height:18px}

html[dir="ltr"] .dropdown-menu{right:auto;left:0}.dropdown:hover .dropdown-menu,.dropdown:focus-within .dropdown-menu,.dropdown.open .dropdown-menu{display:grid}
.drop-item{display:flex;align-items:center;gap:12px;padding:13px;border-radius:17px;cursor:pointer;transition:.2s}.drop-item:hover{background:rgba(201,155,81,.13);transform:translateX(-2px)}
.icon-box{width:46px;height:46px;border-radius:15px;display:grid;place-items:center;background:rgba(201,155,81,.14);border:1px solid var(--line);color:var(--gold2);flex:0 0 46px}
.icon-box svg,.service-icon svg,.contact-icon svg{width:25px;height:25px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.contact-icon svg{fill:currentColor;stroke:none}
.tools{display:flex;gap:9px;align-items:center}.langs{display:flex;gap:4px;padding:4px;border:1px solid var(--line);border-radius:999px}.langs button{border:0;background:transparent;color:var(--text);font-weight:900;min-width:42px;padding:8px 10px;border-radius:999px;cursor:pointer}.langs .active{background:linear-gradient(135deg,var(--gold2),var(--gold));color:#111}
.icon-btn{width:46px;height:46px;border-radius:15px;border:1px solid var(--line);background:transparent;color:var(--text);cursor:pointer;display:grid;place-items:center;font-size:22px}.menu-btn{display:none}

.hero-grid{min-height:680px;display:grid;grid-template-columns:minmax(0,1.05fr) minmax(320px,.95fr);gap:48px;align-items:center;padding:58px 0}
.hero h1{font-size:clamp(42px,5.2vw,74px);line-height:1.1;margin:0 0 20px;letter-spacing:-1px;max-width:10ch}
.hero p{font-size:20px;color:var(--muted);max-width:680px;margin:0 0 30px}
.hero-actions,.form-actions{display:flex;gap:14px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:14px 24px;border-radius:16px;border:1px solid var(--line);background:transparent;color:var(--text);font-weight:900;cursor:pointer;transition:.2s}
.btn:hover{transform:translateY(-2px);box-shadow:0 14px 35px rgba(201,155,81,.16)}.btn.gold{background:linear-gradient(135deg,var(--gold2),var(--gold));color:#111;border:0}
.hero-copy,.hero-panel{min-width:0}.hero-panel{border:1px solid var(--line);border-radius:30px;background:rgba(10,10,10,.52);box-shadow:var(--shadow);padding:36px;backdrop-filter:blur(8px)}body.light .hero-panel{background:rgba(255,255,255,.74)}.hero-panel img{width:min(390px,100%);margin:auto}
.section{padding:78px 0;background:var(--bg)}.section.alt{background:var(--bg2)}.section-title{text-align:center;max-width:780px;margin:0 auto 36px}.section-title h2{font-size:clamp(32px,4vw,50px);margin:0;color:var(--text)}.section-title p{margin:10px 0 0;color:var(--muted);font-size:17px}
.about-card{display:grid;grid-template-columns:1.05fr 1fr;gap:26px;border:1px solid var(--line);border-radius:var(--radius);background:linear-gradient(135deg,rgba(201,155,81,.10),rgba(255,255,255,.025));box-shadow:var(--shadow);padding:32px}
.about-card h2{margin:0 0 14px;color:var(--gold2);font-size:36px}.about-card p{margin:0;color:var(--muted);font-size:17px}
.values{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.value{border:1px solid var(--line);background:var(--surface);border-radius:22px;padding:20px}.value strong{display:block;color:var(--gold2);font-size:22px;margin-bottom:5px}.value span{color:var(--muted);font-size:14px}
.services-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px}
.service-card{position:relative;min-height:260px;border:1px solid var(--line);border-radius:26px;background:linear-gradient(180deg,var(--surface),var(--bg));padding:24px;display:flex;flex-direction:column;cursor:pointer;transition:.25s;overflow:hidden}
.service-card:hover,.service-card.active{transform:translateY(-4px);border-color:var(--gold2);box-shadow:0 0 0 1px rgba(201,155,81,.33),0 24px 55px rgba(201,155,81,.12)}
.service-icon{width:60px;height:60px;border-radius:18px;display:grid;place-items:center;background:rgba(201,155,81,.14);color:var(--gold2);border:1px solid var(--line);margin-bottom:18px}
.service-card h3{font-size:28px;margin:0 0 8px}.service-card p{margin:0;color:var(--muted);font-size:15px}
.service-list{margin:18px 0 0;padding:0;list-style:none;display:grid;gap:8px}
.service-list li{position:relative;padding-inline-start:16px;font-size:13px;color:var(--text)}.service-list li:before{content:"";position:absolute;inset-inline-start:0;top:10px;width:6px;height:6px;border-radius:50%;background:var(--gold2)}
.expand-note{margin-top:auto;color:var(--gold2);font-weight:900;font-size:13px;padding-top:14px}
.detail-grid{display:grid;grid-template-columns:.85fr 1.15fr;gap:24px;align-items:start}
.request,.details{border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow);padding:28px}
.request h3,.details h3{font-size:30px;color:var(--gold2);margin:0 0 18px}
.field{display:grid;gap:8px;margin-bottom:14px}label{font-weight:900;color:var(--muted);font-size:14px}
input,select,textarea{width:100%;min-height:52px;border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.04);color:var(--text);padding:12px 14px;outline:0}body.light input,body.light select,body.light textarea{background:#fff;color:#111}textarea{min-height:126px;resize:vertical}
.items-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.item{border:1px solid var(--line);border-radius:20px;padding:18px;background:rgba(255,255,255,.035)}.item-top{display:flex;align-items:center;gap:12px;margin-bottom:8px}.num{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,var(--gold2),var(--gold));color:#111;display:grid;place-items:center;font-weight:900;flex:0 0 42px}.item h4{font-size:17px;margin:0}.item p{margin:0;color:var(--muted);font-size:14px}
.contact-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px}.contact-card{display:flex;align-items:center;justify-content:space-between;gap:14px;border:1px solid var(--line);border-radius:22px;background:linear-gradient(180deg,var(--surface),var(--surface2));padding:18px 20px;transition:.2s;min-height:98px;box-shadow:0 12px 30px rgba(0,0,0,.12)}.contact-card:hover{transform:translateY(-3px);border-color:var(--gold2)}.contact-card.whatsapp{border-color:rgba(37,211,102,.45)}.contact-icon{width:58px;height:58px;border-radius:18px;background:rgba(201,155,81,.12);display:grid;place-items:center;color:var(--gold2);font-size:28px;font-weight:900;flex:0 0 58px}.contact-icon svg{width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}.whatsapp .contact-icon{color:var(--green);background:rgba(37,211,102,.13)}.whatsapp .contact-icon svg{fill:currentColor;stroke:none}.email-card{border-color:rgba(201,155,81,.4)}.email-icon{background:rgba(201,155,81,.14);color:var(--gold2)}.instagram-icon{background:linear-gradient(135deg,#f9ce34 0%,#ee2a7b 48%,#6228d7 100%);color:#fff;box-shadow:0 10px 24px rgba(238,42,123,.24)}.contact-card strong{display:block;font-size:17px;line-height:1.35}.contact-card span{display:none}.contact-label{flex:1;display:flex;align-items:center}.contact-label strong{margin:0}
.footer{background:#050505;border-top:1px solid var(--line);padding:46px 0 20px}body.light .footer{background:#fff8ed}.footer-grid{display:grid;grid-template-columns:1.1fr .8fr 1fr;gap:30px}.footer-logo{width:260px;margin-bottom:16px}.footer h3{margin:0 0 13px;color:var(--gold2)}.footer ul{list-style:none;padding:0;margin:0;display:grid;gap:8px}.footer p,.footer li,.footer a{color:var(--muted)}.contact-info-list{display:grid;gap:10px}.contact-info-list li{display:flex}.contact-chip{display:inline-flex;align-items:center;justify-content:flex-start;direction:ltr;unicode-bidi:embed;text-align:left;white-space:nowrap;padding:10px 14px;border-radius:14px;background:rgba(201,155,81,.12);border:1px solid var(--line);color:var(--text);font-size:14px;max-width:100%;overflow:hidden;text-overflow:ellipsis}.copy{border-top:1px solid var(--line);text-align:center;margin-top:28px;padding-top:18px;color:var(--muted);font-size:13px}
.float-wa{position:fixed;left:18px;bottom:18px;width:70px;height:70px;border-radius:50%;background:var(--green);color:white;display:grid;place-items:center;z-index:110;box-shadow:0 16px 36px rgba(37,211,102,.33)}html[dir="ltr"] .float-wa{left:auto;right:18px}.float-wa svg{width:38px;height:38px;fill:currentColor}

/* إصلاحات دقيقة بناءً على الملاحظات */
.field select,.field input,.field textarea{
  background:linear-gradient(180deg,var(--surface2),var(--surface)) !important;
  color:var(--text) !important;
  border-color:var(--line) !important;
}
.field select option{
  background:#151515 !important;
  color:#fff8ec !important;
}
body.light .field select,
body.light .field input,
body.light .field textarea{
  background:#fffaf3 !important;
  color:#181512 !important;
}
body.light .field select option{
  background:#fffaf3 !important;
  color:#181512 !important;
}
body.light .service-card,
body.light .item,
body.light .request-box,
body.light .details,
body.light .contact-card{
  background:linear-gradient(180deg,#fffdf8,#f7efe2) !important;
}
body.light .hero h1,
body.light .section-title h2,
body.light .detail-grid h3,
body.light .service-card h3{
  color:#181512 !important;
}
body.light .hero p,
body.light .service-card p,
body.light .item p,
body.light .contact-card span{
  color:#62594f !important;
}
.contact-card.instagram .contact-icon{
  background:linear-gradient(135deg,#f9ce34 0%,#ee2a7b 48%,#6228d7 100%) !important;
  color:#ffffff !important;
  box-shadow:0 12px 28px rgba(238,42,123,.22);
}
.contact-card .contact-label{display:flex;align-items:center}
.contact-card .contact-label strong{margin:0}
.services-menu{width:420px}
.info-menu{width:340px;padding:16px;display:none;grid-template-columns:1fr;gap:12px}
.info-card{padding:14px 16px;border-radius:18px;background:rgba(201,155,81,.08);border:1px solid var(--line)}
.info-card h4{margin:0 0 8px;color:var(--gold2);font-size:18px}
.info-card p{margin:0;color:var(--muted);font-size:14px;line-height:1.7}
.info-links{display:grid;gap:8px}
.info-link{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;border-radius:16px;background:rgba(255,255,255,.03);border:1px solid var(--line);font-weight:800;transition:.2s}
.info-link:hover{background:rgba(201,155,81,.12);transform:translateY(-1px)}
html[dir="ltr"] .info-link{flex-direction:row-reverse}
body.light .contact-card,body.light .info-link{background:linear-gradient(180deg,#fffdf8,#f7efe2)!important}
body.light .info-card{background:rgba(169,118,49,.08)}

@media(max-width:1120px){
  .services-grid{grid-template-columns:repeat(2,minmax(0,1fr)) !important}
}
@media(max-width:760px){
  .services-grid{grid-template-columns:1fr !important}
  .dropdown-menu{position:static;width:100%;margin-top:8px}

.dropdown > button {
  pointer-events: auto !important;
}

.nav,
.header,
.header-inner {
  overflow: visible !important;
}

/* On mobile, dropdowns should not stay open on accidental hover */
@media (max-width: 768px) {
  .dropdown:hover > .dropdown-menu {
    display: none !important;
  }
  .dropdown.open > .dropdown-menu,
  .dropdown:focus-within > .dropdown-menu {
    display: grid !important;
  }
}

/* 4) Keep assistant over content but do not duplicate fallback assistant */
#ifa-ai-widget,
#ifa-ai-panel,
#ifa-ai-button,
#ifaNewAssistantRoot,
#ifaFinalAssistant {
  display: none !important;
  visibility: hidden !important;
  pointer-events: none !important;
}

#ifaSmartAssistantBox,
#faSmartAssistantBox,
#ifaSmartAssistantBtn,
.faSmartAssistantBtn,
.faBotNudge {
  z-index: 2147483647 !important;
}

<script>
(function(){
  // Keep the visual layout fixed even if language functions try to change dir.
  function keepLayoutStable(){
    document.documentElement.setAttribute('dir', 'rtl');
    document.body && document.body.setAttribute('dir', 'rtl');
    document.documentElement.style.direction = 'rtl';
    if (document.body) document.body.style.direction = 'rtl';
  }

  keepLayoutStable();
  document.addEventListener('DOMContentLoaded', keepLayoutStable);
  document.addEventListener('click', function(e){
    if (e.target && (e.target.closest('.langs') || e.target.matches('[data-lang], .lang-btn'))) {
      setTimeout(keepLayoutStable, 50);
      setTimeout(keepLayoutStable, 250);
    }
  }, true);

  // Close dropdowns when cursor leaves the exact dropdown area.
  document.addEventListener('DOMContentLoaded', function(){
    document.querySelectorAll('.dropdown').forEach(function(drop){
      drop.addEventListener('mouseleave', function(){
        drop.classList.remove('open');
      });
      var trigger = drop.querySelector('button, a');
      if (trigger) {
        trigger.addEventListener('click', function(ev){
          // Allow click-to-open only for actual dropdown triggers.
          drop.classList.toggle('open');
          ev.stopPropagation();
        });
      }
    });

    document.addEventListener('click', function(e){
      if (!e.target.closest('.dropdown')) {
        document.querySelectorAll('.dropdown.open').forEach(function(d){ d.classList.remove('open'); });
      }
    });
  });
})();
</script>

let lang = localStorage.getItem("ifa_lang") || "ar";
let active = localStorage.getItem("ifa_active_service") || "education";

const $ = (id) => document.getElementById(id);
function data() { return CONTENT[lang]; }
function getService(id) { return data().services.find(s => s.id === id) || data().services[0]; }

function expandNoteText(){
  if(lang === "tr") return "Tüm detayları görüntülemek için tıklayın";
  if(lang === "en") return "Click to view full details";
  return "اضغط لعرض التفاصيل كاملة";
}

function render() {
  const d = data();
  document.documentElement.lang = lang;
  document.documentElement.dir = d.dir;
  document.querySelectorAll(".langs button").forEach(b => b.classList.toggle("active", b.dataset.lang === lang));
  document.querySelectorAll("[data-nav]").forEach(n => n.textContent = d.nav[Number(n.dataset.nav)]);
  $("brandSub").textContent = d.brandSub;
  $("heroTitle").textContent = d.heroTitle;
  $("heroText").textContent = d.heroText;
  $("ctaOrder").textContent = d.ctaOrder;
  $("ctaServices").textContent = d.ctaServices;
  $("aboutTitle").textContent = d.aboutTitle;
  $("aboutText").textContent = d.aboutText;
  $("values").innerHTML = d.values.map(v => `<div class="value"><strong>${v[0]}</strong><span>${v[1]}</span></div>`).join("");
  $("servicesTitle").textContent = d.servicesTitle;
  $("servicesSub").textContent = d.servicesSub;
  $("requestTitle").textContent = d.requestTitle;
  $("labelName").textContent = d.labels.name;
  $("labelPhone").textContent = d.labels.phone;
  $("labelCategory").textContent = d.labels.category || "القسم";
  $("labelService").textContent = d.labels.service;
  $("labelNote").textContent = d.labels.note;
  $("nameInput").placeholder = d.ph.name;
  $("phoneInput").placeholder = d.ph.phone;
  $("noteInput").placeholder = d.ph.note;
  $("sendBtn").textContent = d.send;
  $("contactTitle").textContent = d.contactTitle;
  $("contactSub").textContent = d.contactSub;
  $("wa1").textContent = d.wa1;
  $("wa2").textContent = d.wa2;
  $("emailTitle").textContent = d.email;
  $("instagramTitle").textContent = d.instagram;
  $("footerText").textContent = d.footerText;
  $("quickTitle").textContent = d.quick;
  if ($("contactInfoTitle")) $("contactInfoTitle").textContent = d.contactInfo;
  $("rights").textContent = d.rights;
  $("quickLinks").innerHTML = d.nav.map((n,i) => `<li><a href="${['#home','#services','#about','#contact'][i]}">${n}</a></li>`).join("");
  renderDropdown();
  renderAboutMenu();
  renderContactMenu();
  renderServices();
  renderDetail(active);
}


function renderAboutMenu() {
  const d = data();
  $("aboutMenu").innerHTML = `
    <div class="info-card">
      <h4>${d.aboutTitle}</h4>
      <p>${d.aboutText}</p>
    </div>
    <a class="info-link" href="#about">
      <span>${d.aboutTitle}</span>
      <span>→</span>
    </a>`;
}

function renderDropdown() {
  $("dropdownMenu").innerHTML = data().services.map(s => `
    <div class="drop-item" onclick="openService('${s.id}')">
      <div class="icon-box">${ICONS[s.icon]}</div>
      <div><strong>${s.title}</strong><br><small style="color:var(--muted)">${s.subtitle}</small></div>
    </div>
  `).join("");
}

function renderServices() {
  $("servicesGrid").innerHTML = data().services.map(s => `
    <article class="service-card ${s.id === active ? 'active' : ''}" onclick="openService('${s.id}')">
      <div class="service-icon">${ICONS[s.icon]}</div>
      <h3>${s.title}</h3>
      <p>${s.subtitle}</p>
      <ul class="service-list">
        ${s.items.slice(0,3).map(item => `<li>${item.name}</li>`).join("")}
      </ul>
      <div class="expand-note">${expandNoteText()}</div>
    </article>
  `).join("");
}

function renderDetail(id) {
  const s = getService(id);
  active = s.id;
  localStorage.setItem("ifa_active_service", active);
  $("detailTitle").textContent = s.title;
  $("detailIntro").textContent = s.intro;
  $("itemsGrid").innerHTML = s.items.map((item, idx) => `
    <article class="item">
      <div class="item-top"><div class="num">${String(idx+1).padStart(2,'0')}</div><h4>${item.name}</h4></div>
      <p>${item.desc}</p>
    </article>
  `).join("");
  if ($("categorySelect")) {
    $("categorySelect").innerHTML = data().services.map(sv => `<option value="${sv.id}">${sv.title}</option>`).join("");
    $("categorySelect").value = s.id;
  }
  fillServiceOptions(s.id);
}


function fillServiceOptions(serviceId) {
  const s = getService(serviceId || active);
  $("serviceSelect").innerHTML = `<option value="">${data().ph.service}</option>` + s.items.map(item => `<option value="${item.name}">${item.name}</option>`).join("");
}

function openService(id) {
  active = id;
  renderServices();
  renderDetail(id);
  document.getElementById("detail").scrollIntoView({behavior:"smooth"});
  document.getElementById("nav").classList.remove("open");
  document.getElementById("dropdown").classList.remove("open");
}

document.querySelectorAll(".langs button").forEach(btn => btn.addEventListener("click", () => {
  lang = btn.dataset.lang;
  localStorage.setItem("ifa_lang", lang);
  render();
}));

document.addEventListener("change", (e) => {
  if (e.target && e.target.id === "categorySelect") {
    active = e.target.value;
    renderServices();
    renderDetail(active);
  }
});

$("themeBtn").addEventListener("click", () => {
  document.body.classList.toggle("light");
  localStorage.setItem("ifa_theme", document.body.classList.contains("light") ? "light" : "dark");
  $("themeBtn").textContent = document.body.classList.contains("light") ? "☾" : "☀";
});

$("menuBtn").addEventListener("click", () => $("nav").classList.toggle("open"));
$("dropdown").addEventListener("click", (e) => {
  if (e.target.closest(".drop-item")) return;
  $("dropdown").classList.toggle("open");
});
document.addEventListener("click", (e) => {
  if (!e.target.closest("#dropdown")) $("dropdown").classList.remove("open");
});

$("requestForm").setAttribute("name", "ifa-order");
$("requestForm").setAttribute("method", "POST");
$("requestForm").setAttribute("data-netlify", "true");

if (!$("requestForm").querySelector('input[name="form-name"]')) {
  const hiddenFormName = document.createElement("input");
  hiddenFormName.type = "hidden";
  hiddenFormName.name = "form-name";
  hiddenFormName.value = "ifa-order";
  $("requestForm").prepend(hiddenFormName);
}

$("requestForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const form = $("requestForm");
  const sendBtn = $("sendBtn");
  const oldText = sendBtn.textContent;

  let status = document.getElementById("ifaFormStatus");
  if (!status) {
    status = document.createElement("div");
    status.id = "ifaFormStatus";
    status.style.marginTop = "14px";
    status.style.padding = "12px 14px";
    status.style.borderRadius = "14px";
    status.style.fontWeight = "800";
    status.style.lineHeight = "1.7";
    form.appendChild(status);
  }

  if (!($("nameInput").value || "").trim() || !($("phoneInput").value || "").trim()) {
    status.textContent = lang === "tr"
      ? "Lütfen adınızı ve telefon numaranızı yazın."
      : lang === "en"
      ? "Please enter your name and phone number."
      : "يرجى كتابة الاسم ورقم الواتساب قبل إرسال الطلب.";
    status.style.border = "1px solid rgba(255,176,32,.38)";
    status.style.background = "rgba(255,176,32,.10)";
    status.style.color = document.body.classList.contains("light") ? "#8a5b00" : "#ffe2a4";
    return;
  }

  const catText = $("categorySelect") ? $("categorySelect").selectedOptions[0].textContent : getService(active).title;

  const formData = new URLSearchParams();
  formData.append("form-name", "ifa-order");
  formData.append("name", $("nameInput").value || "");
  formData.append("phone", $("phoneInput").value || "");
  formData.append("category", catText || "");
  formData.append("service", $("serviceSelect").value || "");
  formData.append("message", $("noteInput").value || "");
  formData.append("language", lang || "ar");

  sendBtn.disabled = true;
  sendBtn.textContent = lang === "tr" ? "Gönderiliyor..." : lang === "en" ? "Sending..." : "جاري الإرسال...";

  try {
    const res = await fetch("/", {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
      body: formData.toString()
    });

    // Netlify sometimes returns 200 or 303/redirect; fetch follows redirect and still succeeds.
    if (!res.ok) throw new Error("netlify_form_error_" + res.status);

    form.reset();
    renderServices();

    status.textContent = lang === "tr"
      ? "Talebiniz başarıyla alınmıştır. IFA şirket temsilcilerimizden biri en kısa sürede sizinle iletişime geçecektir. IFA FOR PUBLIC SERVICES'i tercih ettiğiniz için teşekkür ederiz."
      : lang === "en"
      ? "Your request has been received successfully. One of IFA’s representatives will contact you as soon as possible. Thank you for choosing IFA FOR PUBLIC SERVICES."
      : "تم استلام طلبكم بنجاح. سيقوم أحد ممثلي شركة إيفاء بالتواصل معكم في أقرب وقت ممكن. شكرًا لاختياركم شركة إيفاء للخدمات العامة والتعليمية.";
    status.style.border = "1px solid rgba(37,211,102,.35)";
    status.style.background = "rgba(37,211,102,.10)";
    status.style.color = document.body.classList.contains("light") ? "#116b38" : "#bff5d1";
  } catch (err) {
    status.textContent = lang === "tr"
      ? "نعتذر، لم يتم إرسال الطلب حاليًا. يرجى المحاولة مرة أخرى أو التواصل معنا مباشرة عبر واتساب."
      : lang === "en"
      ? "We’re sorry, your request could not be sent at the moment. Please try again or contact us directly via WhatsApp."
      : "نعتذر، لم يتم إرسال الطلب حاليًا. يرجى المحاولة مرة أخرى أو التواصل معنا مباشرة عبر واتساب.";

  function getActiveLang(){
    const htmlLang = (document.documentElement.lang || '').toLowerCase();
    if(htmlLang.startsWith('tr')) return 'tr';
    if(htmlLang.startsWith('en')) return 'en';
    const buttons = Array.from(document.querySelectorAll('button,a,span'));
    const active = buttons.find(el=>{
      const t = (el.textContent || '').trim().toUpperCase();
      if(!['AR','TR','EN'].includes(t)) return false;
      return el.classList.contains('active') || el.getAttribute('aria-pressed') === 'true';
    });
    const t = active ? (active.textContent || '').trim().toLowerCase() : '';
    if(t === 'tr') return 'tr';
    if(t === 'en') return 'en';
    return 'ar';
  }
  function nowTime(){
    try{
      return new Intl.DateTimeFormat(currentLang === 'ar' ? 'ar-EG' : currentLang === 'tr' ? 'tr-TR' : 'en-US',{hour:'2-digit',minute:'2-digit'}).format(new Date());
    }catch(e){
      const d = new Date();
      return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
    }
  }
  function norm(s){
    return (s || '').toString().toLowerCase()
      .replace(/[أإآ]/g,'ا').replace(/ة/g,'ه').replace(/ى/g,'ي')
      .replace(/[^\u0600-\u06FFa-z0-9çğıöşüÇĞİÖŞÜ\s]/g,' ')
      .replace(/\s+/g,' ').trim();
  }

  function typeText(el, text, speed, done){

        setTimeout(step, speed);
      } else if(typeof done === 'function') {
        done();
      }
    })();
  }

  function scoreLocal(q){
    const t = I18N[currentLang];
    const nq = norm(q);
    const ranked = ANSWERS[currentLang].map(item=>({item, score:item.keys.reduce((a,k)=>a + (nq.includes(norm(k)) ? 1 : 0), 0)})).sort((a,b)=>b.score-a.score);
    if(ranked[0] && ranked[0].score > 0){
      let response = ranked[0].item.text;
      if(currentLang === 'ar'){
        if(/كيف|شلون|ماهي|وش|ايش|ماذا|what|how/.test(nq)) response += '\n\n' + t.more;
        if(/مطلوب|اوراق|أوراق|مستند|وثائق|document|documents/.test(nq)) response += '\n\n' + t.docs;
        if(/كم|سعر|رسوم|تكلف|cost|price/.test(nq)) response += '\n\n' + t.price;
      }else if(currentLang === 'tr'){
        if(/nasıl|nasil|ne|hangi|what|how/.test(nq)) response += '\n\n' + t.more;
        if(/belge|evrak|gerekli|document/.test(nq)) response += '\n\n' + t.docs;
        if(/ücret|ucret|fiyat|price|cost/.test(nq)) response += '\n\n' + t.price;
      }else{
        if(/how|what|which/.test(nq)) response += '\n\n' + t.more;
        if(/document|required|paper/.test(nq)) response += '\n\n' + t.docs;
        if(/price|cost|fee/.test(nq)) response += '\n\n' + t.price;
      }
      return response;
    }
    return t.fallback;
  }
  async function getRemoteReply(message){
    try{
      const res = await fetch(AI_ENDPOINT, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({message, lang: currentLang, history: history.slice(-6)})
      });
      if(!res.ok) return null;
      const data = await res.json();
      if(data && data.reply){
        aiMode = data.mode === 'ai';
        setMode();
        return String(data.reply).trim();
      }
      aiMode = false;
      setMode();
      return null;
    }catch(e){
      aiMode = false;
      setMode();
      return null;
    }
  }
  async function getReply(message){
    const remote = await getRemoteReply(message);
    return remote || scoreLocal(message);
  }

    cancelCloseTimer();
    closeTimer = setTimeout(closePanel, 900);
  }
  function armSessionTimer(){
    clearTimeout(sessionTimer);
    sessionTimer = setTimeout(()=>{
      resetChat(true);
      closePanel();
    }, 5 * 60 * 1000);
  }
  async function askQuestion(message){
    armSessionTimer();
    addUser(message);
    showTyping(true);
    const answer = await getReply(message);
    setTimeout(()=>{
      showTyping(false);
      addBot(answer, true, false, true);
    }, 520);
  }
  function welcome(){
    addBot(I18N[currentLang].welcome, true, true);
  }
  function resetChat(showWelcome = true){
    history = [];
    Array.from(chat.querySelectorAll('.ifaBotMsgWrap')).forEach(el => el.remove());
    showTyping(false);
    if(showWelcome) welcome();
  }

  openBtn.addEventListener('click', ()=>{
    if(panel.classList.contains('open')) closePanel();
    else openPanel();
  });
  closeBtn.addEventListener('click', closePanel);
  resetBtn.addEventListener('click', ()=>{ resetChat(true); armSessionTimer(); });

  form.addEventListener('submit', e=>{
    e.preventDefault();
    const q = input.value.trim();
    if(!q) return;
    input.value = '';
    openPanel();
    askQuestion(q);
  });

  [panel, openBtn].forEach(el=>{
    el.addEventListener('mouseenter', cancelCloseTimer);
    el.addEventListener('mouseleave', scheduleClose);
  });

  document.addEventListener('click', (e)=>{
    if(!panel.classList.contains('open')) return;
    if(panel.contains(e.target) || openBtn.contains(e.target)) return;
    closePanel();
  });

  ['click','keydown','touchstart'].forEach(evt=>window.addEventListener(evt, ()=>{
    if(panel.classList.contains('open')) armSessionTimer();
  }, {passive:true}));

  document.addEventListener('click', (e)=>{
    const txt = (e.target && e.target.textContent ? e.target.textContent.trim().toUpperCase() : '');
    if(txt === 'AR' || txt === 'TR' || txt === 'EN'){
      setTimeout(()=>applyLang(true), 160);
    }
  }, true);

  applyLang(true);
})();
</script>

<script id="ifa-final-openrouter-ui">
(function(){
  const START_VISITORS = 200;
  const WA1 = "https://wtsi.me/905376053328";
  const WA2 = "https://wsend.co/967737930450";

  function activeLang(){
    const h = (document.documentElement.lang || "").toLowerCase();
    if(h.startsWith("tr")) return "tr";
    if(h.startsWith("en")) return "en";
    if(h.startsWith("ar")) return "ar";
    const active = Array.from(document.querySelectorAll("button,a,span,div")).find(x => {
      const t = (x.textContent || "").trim().toLowerCase();
      return (t === "ar" || t === "tr" || t === "en") && (x.className || "").toString().includes("active");
    });
    const t = (active && active.textContent || "").trim().toLowerCase();
    if(t === "tr") return "tr";
    if(t === "en") return "en";
    return "ar";
  }

  function visitorLabel(){
    const l = activeLang();
    if(l === "tr") return "Site ziyaretleri";
    if(l === "en") return "Site visitors";
    return "زوار الموقع";
  }

  function visitorCount(){
    const key = "ifa_final_visit_count";
    let n = parseInt(localStorage.getItem(key) || String(START_VISITORS), 10);
    if(!Number.isFinite(n) || n < START_VISITORS) n = START_VISITORS;
    const seen = "ifa_final_seen";
    if(!localStorage.getItem(seen)){
      n += 1;
      localStorage.setItem(key, String(n));
      localStorage.setItem(seen, String(Date.now()));
    }
    return n;
  }

  function placeCounter(){
    const existing = document.querySelector(".ifaVisitorCounterVFinal");
    if(existing){
      const lab = existing.querySelector("[data-visitor-label]");
      if(lab) lab.textContent = visitorLabel() + ":";
      return;
    }

    document.querySelectorAll(".ifaVisitorCounterV70,.ifaVisitorCounterV71,.ifaVisitorCounterV72,.ifaVisitorCounterV73,.ifaVisitorCounterV75,.ifaInlineVisitorCounter,.ifaFloatingVisitorCounter,.ifaTopVisitorCounter,.ifaVisitorCounter,.ifaLeftVisitorCounter").forEach(el => el.remove());

    const el = document.createElement("div");
    el.className = "ifaVisitorCounterVFinal";
    el.innerHTML = '<span>👁️</span><span data-visitor-label>'+visitorLabel()+':</span><b>'+visitorCount().toLocaleString()+"</b>";
    const target = document.querySelector("main section, .hero, #home, header");
    if(target) target.insertAdjacentElement("afterend", el);
    else document.body.insertBefore(el, document.body.firstChild);
  }

  function hideWelcomeChoices(){
    const roots = Array.from(document.querySelectorAll('[class*="chat"],[class*="assistant"],[class*="bot"],.ifaBotMsg,[class*="message"]'));
    roots.forEach(root => {
      const txt = root.textContent || "";
      const isWelcome = txt.includes("أهلًا بك في IFA FOR PUBLIC SERVICES") || txt.includes("اختر الخدمة التي تناسبك") || txt.includes("يمكنك كتابة سؤالك مباشرة") || txt.includes("I am here to help you");
      if(!isWelcome) return;
      root.querySelectorAll("button, a, [role='button'], .chip, [class*='chip'], [class*='quick'], [class*='suggest'], [class*='service']").forEach(el => {
        const t = (el.textContent || "").trim();
        if(t && t.length < 90) el.classList.add("ifaHideWelcomeChoices");
      });
      Array.from(root.querySelectorAll("div, p, section")).forEach(el => {
        const t = (el.textContent || "").trim();
        if(t.includes("اختر الخدمة التي تناسبك") || t.includes("الاقتراحات التي سأعرضها لك الآن")) el.classList.add("ifaHideWelcomeChoices");
      });
    });
  }

  function showContactChoicesUnderLastAssistant(){
    const nodes = Array.from(document.querySelectorAll('.ifaBotMsg,.bot-message,[class*="assistant-message"],[class*="bot-message"],[class*="message"]'));
    const last = nodes[nodes.length - 1];
    if(!last || last.querySelector(".ifaContactChoiceFinal")) return;
    const txt = last.textContent || "";
    if(/تواصل|ممثل|واتساب|whatsapp|representative|temsilci/i.test(txt)){
      const box = document.createElement("div");
      box.className = "ifaContactChoiceFinal";
      box.innerHTML = '<a href="'+WA1+'" target="_blank" rel="noopener noreferrer">🟢 واتساب 1</a><a href="'+WA2+'" target="_blank" rel="noopener noreferrer">🟢 واتساب 2</a>';
      last.appendChild(box);
    }
  }

  function cleanUI(){
    const note = activeLang() === "en" ? "Click to view full details" : (activeLang() === "tr" ? "Tüm detayları görüntülemek için tıklayın" : "اضغط لعرض التفاصيل كاملة");
    document.querySelectorAll(".expand-note").forEach(el => el.textContent = note);
    document.querySelectorAll(".ifaV70SuggestionBox,.ifaV71SuggestionBox,.ifaV72SuggestionBox,.ifaV73SuggestionBox,.ifaV75SuggestionBox,.ifaV68Suggestions,.ifaV69Suggestions,.ifaV63Chips,.ifaV62Suggestions,.ifaV61Suggestions,.ifaFollowupChip,.ifaBotMiniBtn,.ifaBotWaInline").forEach(el => el.remove());

    hideWelcomeChoices();
    placeCounter();
    showContactChoicesUnderLastAssistant();
  }

  if(document.readyState === "loading") document.addEventListener("DOMContentLoaded", cleanUI);
  else cleanUI();

  document.addEventListener("click", function(e){
    const txt = (e.target && e.target.textContent || "").trim().toLowerCase();
    if(["ar","tr","en"].includes(txt) || txt.includes("العربية") || txt.includes("english") || txt.includes("türk")) {
      setTimeout(cleanUI, 120);
      setTimeout(cleanUI, 450);
    }
  }, true);

  let scheduled = false;
  new MutationObserver(function(){
    if(scheduled) return;
    scheduled = true;
    setTimeout(function(){
      scheduled = false;
      cleanUI();
    }, 500);
  }).observe(document.documentElement, {childList:true, subtree:true, attributes:true, attributeFilter:["lang","dir","class"]});

  setInterval(function(){
    const lab = document.querySelector(".ifaVisitorCounterVFinal [data-visitor-label]");
    if(lab) lab.textContent = visitorLabel() + ":";
  }, 1200);
})();
</script>
